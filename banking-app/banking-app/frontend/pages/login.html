<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — NexaBank</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
  <div class="loading-overlay" id="loader"><div class="loader"></div></div>
  <div class="auth-page">
    <div class="auth-left">
      <a href="../index.html" class="auth-logo">⬡ NexaBank</a>
      <h2>Welcome Back</h2>
      <p>Sign in to access your account and manage your finances securely.</p>
      <div class="auth-features">
        <div class="auth-feat"><span>🔒</span> 256-bit encryption</div>
        <div class="auth-feat"><span>⚡</span> Real-time transactions</div>
        <div class="auth-feat"><span>🌍</span> Available worldwide</div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <h3>Sign In</h3>
        <p class="auth-sub">Don't have an account? <a href="register.html">Create one free</a></p>
        <div id="loginError" style="display:none; background:rgba(229,62,62,0.1); padding:12px 16px; border-radius:8px; border-left:3px solid var(--danger); margin-bottom:16px; font-size:13px; color:#FC8181;"></div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" onkeydown="if(event.key==='Enter') handleLogin()"/>
          <span class="error-msg" id="emailErr">Please enter a valid email</span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter') handleLogin()"/>
            <button class="toggle-pass" onclick="togglePass('password')">👁</button>
          </div>
          <span class="error-msg" id="passErr">Password is required</span>
        </div>
        <div class="form-row">
          <label class="checkbox-label"><input type="checkbox" id="remember"/> Remember me</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button class="btn-gold full-btn" id="loginBtn" onclick="handleLogin()">Sign In →</button>
        <div class="divider"><span>or try demo</span></div>
        <button class="btn-outline full-btn" onclick="demoLogin()">Use Demo Account</button>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
      // If already logged in redirect
      if (API.getSession() && API.getToken()) {
        const s = API.getSession();
        window.location.href = s.is_admin ? 'admin.html' : 'dashboard.html';
      }
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      document.getElementById('emailErr').style.display = 'none';
      document.getElementById('passErr').style.display = 'none';
      document.getElementById('loginError').style.display = 'none';

      if (!email || !email.includes('@')) { document.getElementById('emailErr').style.display = 'block'; valid = false; }
      if (!password) { document.getElementById('passErr').style.display = 'block'; valid = false; }
      if (!valid) return;

      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      const result = await API.login(email, password);

      if (result.ok) {
        API.saveSession(result.data.token, result.data.user);
        window.location.href = result.data.user.is_admin ? 'admin.html' : 'dashboard.html';
      } else {
        const err = document.getElementById('loginError');
        err.textContent = '❌ ' + (result.error || 'Invalid email or password');
        err.style.display = 'block';
        btn.textContent = 'Sign In →';
        btn.disabled = false;
      }
    }

    function demoLogin() {
      document.getElementById('email').value = 'demo@nexabank.com';
      document.getElementById('password').value = 'demo1234';
      handleLogin();
    }
  </script>
</body>
</html>
