<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — NexaBank</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
  <div class="loading-overlay" id="loader"><div class="loader"></div></div>
  <div class="auth-page">
    <div class="auth-left">
      <a href="../index.html" class="auth-logo">⬡ NexaBank</a>
      <h2>Join NexaBank</h2>
      <p>Open your free account in under 2 minutes and start banking smarter today.</p>
      <div class="auth-features">
        <div class="auth-feat"><span>✅</span> No monthly fees</div>
        <div class="auth-feat"><span>💳</span> Free virtual card</div>
        <div class="auth-feat"><span>🎁</span> $50 welcome bonus</div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-card">
        <h3>Create Account</h3>
        <p class="auth-sub">Already have an account? <a href="login.html">Sign in</a></p>
        <div id="regError" style="display:none; background:rgba(229,62,62,0.1); padding:12px 16px; border-radius:8px; border-left:3px solid var(--danger); margin-bottom:16px; font-size:13px; color:#FC8181;"></div>
        <div id="regSuccess" style="display:none; background:rgba(56,161,105,0.1); padding:12px 16px; border-radius:8px; border-left:3px solid var(--success); margin-bottom:16px; font-size:13px; color:#48BB78;"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div class="form-group"><label>First Name</label><input type="text" id="firstName" placeholder="John"/></div>
          <div class="form-group"><label>Last Name</label><input type="text" id="lastName" placeholder="Doe"/></div>
        </div>
        <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="john@example.com"/></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" placeholder="+237 6XX XXX XXX"/></div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Min 8 characters" oninput="checkStrength()"/>
            <button class="toggle-pass" onclick="togglePass('password')">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="confirm" placeholder="Repeat password"/>
            <button class="toggle-pass" onclick="togglePass('confirm')">👁</button>
          </div>
          <span class="error-msg" id="confirmErr">Passwords do not match</span>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="terms"/>
            I agree to the <a href="#" style="color:var(--gold);">Terms</a> and <a href="#" style="color:var(--gold);">Privacy Policy</a>
          </label>
          <span class="error-msg" id="termsErr">You must agree to continue</span>
        </div>
        <button class="btn-gold full-btn" id="regBtn" onclick="handleRegister()">Create Account →</button>
      </div>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loader').classList.add('hidden'), 400);
    });

    function checkStrength() {
      const pass = document.getElementById('password').value;
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let s = 0;
      if (pass.length >= 8) s++;
      if (/[A-Z]/.test(pass)) s++;
      if (/[0-9]/.test(pass)) s++;
      if (/[^A-Za-z0-9]/.test(pass)) s++;
      const levels = ['','Weak','Fair','Good','Strong'];
      const colors = ['','#E53E3E','#D69E2E','#3182CE','#38A169'];
      const widths = ['0%','25%','50%','75%','100%'];
      fill.style.width = widths[s]; fill.style.background = colors[s];
      label.textContent = levels[s]; label.style.color = colors[s];
    }

    async function handleRegister() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const terms = document.getElementById('terms').checked;

      document.getElementById('confirmErr').style.display = 'none';
      document.getElementById('termsErr').style.display = 'none';
      document.getElementById('regError').style.display = 'none';

      let valid = true;
      if (!firstName || !lastName || !email || !password) { document.getElementById('regError').textContent = '⚠️ Please fill in all required fields'; document.getElementById('regError').style.display = 'block'; return; }
      if (password.length < 8) { document.getElementById('regError').textContent = '⚠️ Password must be at least 8 characters'; document.getElementById('regError').style.display = 'block'; return; }
      if (password !== confirm) { document.getElementById('confirmErr').style.display = 'block'; valid = false; }
      if (!terms) { document.getElementById('termsErr').style.display = 'block'; valid = false; }
      if (!valid) return;

      const btn = document.getElementById('regBtn');
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      const result = await API.register(firstName + ' ' + lastName, email, phone, password);

      if (result.ok) {
        API.saveSession(result.data.token, result.data.user);
        document.getElementById('regSuccess').textContent = '🎉 Account created! Redirecting...';
        document.getElementById('regSuccess').style.display = 'block';
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      } else {
        document.getElementById('regError').textContent = '❌ ' + (result.error || 'Registration failed');
        document.getElementById('regError').style.display = 'block';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
